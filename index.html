<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário convite</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/index.css" />
  </head>
  <body>
    <div id="app" class="flex">
      <div class="cover">
        <div class="title">
          <img src="assets/Logo.svg" alt="Logo do Festivite" />
          <h1>Festivite</h1>
          <p>Crie um convite digital para o seu evento</p>
        </div>
      </div>
      <div id="form">
        <div class="container-form">
          <h2>Crie seu convite</h2>
          <form action="">
            <fieldset>
              <legend class="cabecalho">
                <img src="assets/icons/calendar.svg" alt="" />
                <h3>Sobre o evento</h3>
              </legend>
              <div class="container-event">
                <div class="input-wrapper titulo">
                <label for="title">Título</label>
                <input
                  type="text"
                  name="title"
                  id="title"
                  placeholder="Nome do evento"
                  required
                />
                <span class="alert flex center">
                  <span class="alert-icon"></span>
                  <small>Item obrigatório</small>
                </span>
              </div>

              <div class="input-wrapper inicio">
                <label for="initial-date">Início</label>
                <input
                  type="datetime"
                  name="initial-date"
                  id="initial-date"
                  placeholder="DD/MM/AAAA, --:--"
                  required
                />
                <span class="alert flex center">
                  <span class="alert-icon"></span>
                  <small>Item obrigatório</small>
                </span>
              </div>

              <div class="input-wrapper end">
                <label for="end-date">Fim</label>
                <input
                  type="datetime"
                  name="end-date"
                  id="end-date"
                  placeholder="DD/MM/AAAA, --:--"
                  required
                />
                <span class="alert flex center">
                  <span class="alert-icon"></span>
                  <small>Item obrigatório</small>
                </span>
              </div>

              <div class="radio-wrapper type">
                <label for="type">Tipo</label>
                <div class="type-option flex">
                  <label class="option flex center" for="presencial">
                    <span class="icon-option-color icon-inperson"></span>
                    <span>Presencial</span>
                    <input type="radio" name="type" id="presencial" required value="presencial" checked/>
                  </label>
                  <label class="option flex center" for="online">
                    <span class="icon-option-color icon-online"></span>
                    <span>Online</span>
                    <input type="radio" name="type" id="online" required value="online"/>
                  </label>
                </div>
                <span class="alert flex center">
                  <span class="alert-icon"></span>
                  <small>Item obrigatório</small>
                </span>
              </div>

              <div class="input-wrapper local">
                <label for="locale">Local</label>
                <input
                  type="text"
                  name="locale"
                  id="locale"
                  placeholder="Link ou endereço"
                  required
                />
                <span class="alert flex center">
                  <span class="alert-icon"></span>
                  <small>Item obrigatório</small>
                </span>
              </div>

              <div class="text-area-wrapper description">
                <label for="description">Descrição</label>
                <textarea name="description" id="description" required placeholder="Escreva sobre os detalhes do evento"></textarea>
                <span class="alert flex center">
                  <span class="alert-icon"></span>
                  <small>Item obrigatório</small>
                </span>
              </div>
              </div>
            </fieldset>
            <fieldset>
              <legend class="cabecalho">
                <img src="assets/icons/paintbrush-vertical.svg" alt="">
                <h3>Personalização</h3>
              </legend>
              <div class="color-picker">
                <span class="title">Cor Principal</span>
              </div>
              <div class="color-options">
                <label for="59B2FF" class="color-option">
                  <input type="radio" name="main-color" id="59B2FF" value="59B2FF" checked>
                  <span class="color-circle color-59B2FF"></span>
                </label>
                
                <label for="6A59FF" class="color-option">
                  <input type="radio" name="main-color" id="6A59FF" value="6A59FF">
                  <span class="color-circle color-6A59FF"></span>
                </label>

                <label for="B259FF" class="color-option">
                  <input type="radio" name="main-color" id="B259FF" value="B259FF">
                  <span class="color-circle color-B259FF"></span>
                </label>

                <label for="FF59F9" class="color-option">
                  <input type="radio" name="main-color" id="FF59F9" value="FF59F9">
                  <span class="color-circle color-FF59F9"></span>
                </label>

                <label for="FF598B" class="color-option">
                  <input type="radio" name="main-color" id="FF598B" value="FF598B">
                  <span class="color-circle color-FF598B"></span>
                </label>

                <label for="FF5959" class="color-option">
                  <input type="radio" name="main-color" id="FF5959" value="FF5959">
                  <span class="color-circle color-FF5959"></span>
                </label>

                <label for="FF8B59" class="color-option">
                  <input type="radio" name="main-color" id="FF8B59" value="FF8B59">
                  <span class="color-circle color-FF8B59"></span>
                </label>

                <label for="FFCD59" class="color-option">
                  <input type="radio" name="main-color" id="FFCD59" value="FFCD59">
                  <span class="color-circle color-FFCD59"></span>
                </label>

                <label for="E1FF59" class="color-option">
                  <input type="radio" name="main-color" id="E1FF59" value="E1FF59">
                  <span class="color-circle color-E1FF59"></span>
                </label>

                <label for="59FF91" class="color-option">
                  <input type="radio" name="main-color" id="59FF91" value="59FF91">
                  <span class="color-circle color-59FF91"></span>
                </label>

                <label for="59FFF9" class="color-option">
                  <input type="radio" name="main-color" id="59FFF9" value="59FFF9">
                  <span class="color-circle color-59FFF9"></span>
                </label>

              </div>
            </fieldset>
            <button type="submit">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
